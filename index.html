<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太白占卜 · 每日運程</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&family=Nunito:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #deeaf8;
    --navy:      #4a6899;
    --navy-dk:   #2c4570;
    --navy-lt:   #7a9abf;
    --yellow:    #f7d55e;
    --yellow-lt: #fef5b8;
    --yellow-dk: #dba820;
    --white:     #ffffff;
    --text:      #2c3e6b;
    --text-dim:  #7a90b8;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--bg);
    background-image:
      radial-gradient(circle at 12% 18%, rgba(255,255,255,0.55) 0%, transparent 38%),
      radial-gradient(circle at 88% 82%, rgba(247,213,94,0.18) 0%, transparent 38%);
    color:var(--text);
    font-family:'Noto Sans TC',sans-serif;
    min-height:100vh;
    overflow-x:hidden;
  }
  /* polka-dot bg */
  body::before{
    content:'';position:fixed;inset:0;
    background-image:radial-gradient(circle,rgba(74,104,153,0.13) 1.5px,transparent 1.5px);
    background-size:26px 26px;pointer-events:none;z-index:0;
  }
  /* drifting clouds */
  .cloud{position:fixed;pointer-events:none;z-index:0;font-size:3rem;opacity:0.16;
    animation:fc 9s ease-in-out infinite;}
  .c1{top:5%;left:1%;animation-duration:8s;}
  .c2{top:13%;right:2%;font-size:2.4rem;animation-duration:11s;animation-delay:2s;}
  .c3{bottom:22%;left:3%;font-size:2.8rem;animation-duration:10s;animation-delay:4s;}
  .c4{bottom:38%;right:1%;font-size:2rem;animation-duration:12s;animation-delay:1s;}
  @keyframes fc{0%,100%{transform:translateY(0)rotate(-2deg);}50%{transform:translateY(-14px)rotate(2deg);}}

  .wrap{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:28px 18px 80px;}

  /* ── HEADER ── */
  header{text-align:center;padding:28px 0 16px;}
  .eyebrow{
    display:inline-block;background:var(--yellow);
    border:3px solid var(--navy);border-radius:999px;
    padding:5px 20px;font-family:'Caveat',cursive;font-size:1rem;
    color:var(--navy-dk);letter-spacing:.06em;margin-bottom:14px;
    box-shadow:3px 3px 0 var(--navy);transform:rotate(-1.2deg);
  }
  h1{
    font-family:'Caveat',cursive;
    font-size:clamp(2.6rem,8vw,4rem);
    color:var(--navy-dk);letter-spacing:.08em;line-height:1.1;
    text-shadow:3px 3px 0 rgba(44,69,112,.16),5px 5px 0 rgba(44,69,112,.07);
    margin-bottom:6px;
  }
  .sub{font-size:.8rem;color:var(--navy-lt);font-weight:300;letter-spacing:.28em;}

  /* doodle divider */
  .div-row{display:flex;align-items:center;justify-content:center;gap:10px;margin:16px 0;opacity:.5;}
  .div-line{flex:1;max-width:76px;height:2.5px;
    background:repeating-linear-gradient(90deg,var(--navy) 0,var(--navy) 5px,transparent 5px,transparent 10px);
    border-radius:2px;}

  /* date pill */
  .date-pill{
    display:flex;align-items:center;justify-content:center;gap:7px;
    background:var(--white);border:2.5px solid var(--navy);border-radius:999px;
    padding:7px 22px;width:fit-content;margin:0 auto 34px;
    box-shadow:3px 3px 0 var(--navy-lt);
    font-size:.8rem;color:var(--navy);letter-spacing:.08em;
  }

  /* ── EARTH BUTTON ── */
  .orb-section{display:flex;flex-direction:column;align-items:center;margin-bottom:48px;}
  .earth-wrap{position:relative;margin-bottom:18px;}

  /* spinning dashed orbit */
  .orbit{
    position:absolute;inset:-20px;border-radius:50%;
    border:2.5px dashed var(--navy);opacity:.22;
    animation:spin 14s linear infinite;
  }
  .orbit::before{
    content:'⭐';position:absolute;top:-11px;left:50%;transform:translateX(-50%);
    font-size:.95rem;opacity:.8;
  }
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

  /* pulsing yellow ring */
  .pulse-ring{
    position:absolute;inset:-6px;border-radius:50%;
    border:3px solid var(--yellow);opacity:0;
    animation:pulse 2.8s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:0;transform:scale(1);}50%{opacity:.55;transform:scale(1.09);}}

  /* the button */
  .fortune-btn{
    position:relative;width:150px;height:150px;border-radius:50%;
    border:4px solid var(--navy-dk);cursor:pointer;background:none;padding:0;
    box-shadow:5px 5px 0 var(--navy-dk),0 0 0 5px rgba(255,255,255,.65);
    transition:transform .15s,box-shadow .15s;overflow:hidden;
  }
  .fortune-btn:hover{transform:scale(1.06)rotate(2deg);box-shadow:7px 7px 0 var(--navy-dk),0 0 0 5px rgba(255,255,255,.65);}
  .fortune-btn:active{transform:scale(.96)rotate(-1deg);box-shadow:2px 2px 0 var(--navy-dk),0 0 0 5px rgba(255,255,255,.65);}
  .fortune-btn.spinning .earth-svg{animation:espin 1.1s linear infinite;transform-origin:center;}
  @keyframes espin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

  .btn-label{font-family:'Caveat',cursive;font-size:.95rem;font-weight:700;color:var(--navy-dk);
    margin-top:10px;letter-spacing:.08em;text-align:center;}

  /* ── RESULT ── */
  #result{display:none;}
  #result.vis{display:block;animation:pop .65s cubic-bezier(.34,1.56,.64,1) forwards;}
  @keyframes pop{from{opacity:0;transform:scale(.88) translateY(18px);}to{opacity:1;transform:scale(1) translateY(0);}}

  .res-head{text-align:center;margin-bottom:22px;}
  .res-badge{
    display:inline-block;background:var(--navy-dk);color:var(--yellow);
    font-family:'Caveat',cursive;font-size:.85rem;letter-spacing:.18em;
    padding:4px 18px;border-radius:999px;margin-bottom:10px;
  }
  .res-title{font-family:'Caveat',cursive;font-size:1.9rem;color:var(--navy-dk);font-weight:700;}

  /* ── CARDS ── */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media(max-width:480px){.grid{grid-template-columns:1fr;}}

  .card{
    background:var(--white);border:2.5px solid var(--navy);
    border-radius:18px 6px 16px 8px / 8px 16px 6px 18px;
    padding:17px 15px;box-shadow:4px 4px 0 var(--navy-lt);
    transition:transform .2s,box-shadow .2s;position:relative;
  }
  .card:nth-child(odd){transform:rotate(-.6deg);}
  .card:nth-child(even){transform:rotate(.5deg);border-radius:8px 18px 6px 16px / 16px 8px 18px 6px;}
  .card:hover{transform:rotate(0) translateY(-3px)!important;box-shadow:6px 6px 0 var(--navy);}
  /* yellow top stripe */
  .card::before{content:'';position:absolute;top:0;left:12px;right:12px;height:4px;
    background:var(--yellow);border-radius:0 0 4px 4px;}

  .c-head{display:flex;align-items:center;gap:8px;margin-bottom:9px;padding-top:4px;}
  .c-icon{font-size:1.25rem;line-height:1;}
  .c-cat{font-family:'Nunito',sans-serif;font-size:.72rem;font-weight:700;color:var(--navy-dk);letter-spacing:.08em;flex:1;}
  .c-stars{font-size:.6rem;color:var(--yellow-dk);letter-spacing:1px;}
  .c-text{font-size:.83rem;line-height:1.88;color:var(--text);font-weight:300;}

  /* advice card */
  .advice{
    grid-column:1/-1;background:var(--yellow-lt);
    border-color:var(--yellow-dk);box-shadow:4px 4px 0 var(--yellow-dk);
    border-radius:14px 20px 14px 20px / 20px 14px 20px 14px;
    transform:rotate(0deg)!important;
  }
  .advice::before{background:var(--yellow-dk);}
  .advice .c-text{
    font-family:'Caveat',cursive;font-size:1.1rem;font-weight:600;
    color:var(--navy-dk);text-align:center;line-height:1.65;
  }

  /* reset */
  .reset-wrap{text-align:center;margin-top:28px;}
  .reset-btn{
    background:var(--white);border:2.5px solid var(--navy);border-radius:999px;
    color:var(--navy);font-family:'Caveat',cursive;font-size:1rem;font-weight:600;
    letter-spacing:.08em;padding:9px 28px;cursor:pointer;
    box-shadow:3px 3px 0 var(--navy-lt);transition:all .15s;
  }
  .reset-btn:hover{background:var(--navy);color:var(--white);box-shadow:4px 4px 0 var(--navy-dk);transform:translateY(-1px);}

  footer{text-align:center;padding-top:50px;font-size:.74rem;color:var(--text-dim);letter-spacing:.08em;font-weight:300;}
  .foot-pill{display:inline-block;background:var(--white);border:2px solid var(--navy-lt);
    border-radius:999px;padding:5px 18px;margin-bottom:7px;opacity:.7;}
</style>

<div class="wrap">

  <!-- HEADER -->
  <header>
    <div class="eyebrow">✨ Daily Fortune ✨</div>
    <h1>太白占卜</h1>
    <p class="sub">每 日 運 程 · 靜 心 感 應</p>

  <div class="div-row">

    <span style="font-size:1rem;color:var(--navy)">⭐</span>
    <span style="font-size:1rem;color:var(--navy)">🌙</span>

      <button class="fortune-btn" id="fortuneBtn" onclick="drawFortune()">

          <!-- Cloud wisps -->
          <ellipse cx="28"  cy="80"  rx="17" ry="7"  fill="rgba(255,255,255,0.55)" transform="rotate(-10,28,80)"/>
          <ellipse cx="103" cy="50"  rx="15" ry="6"  fill="rgba(255,255,255,0.50)" transform="rotate(8,103,50)"/>
          <ellipse cx="58"  cy="114" rx="19" ry="7"  fill="rgba(255,255,255,0.45)" transform="rotate(-5,58,114)"/>
          <ellipse cx="120" cy="82"  rx="13" ry="5"  fill="rgba(255,255,255,0.48)" transform="rotate(12,120,82)"/>

          <text x="8"   y="95"  font-size="13" opacity=".65">✦</text>
          <text x="128" y="28"  font-size="11" opacity=".55">✦</text>
          <text x="68"  y="146" font-size="9"  opacity=".45">✦</text>
          <!-- Dashed outline for hand-drawn feel -->
          <circle cx="75" cy="75" r="73" fill="none" stroke="rgba(44,69,112,0.28)" stroke-width="2.5" stroke-dasharray="6 3"/>

      </button>
    </div>
    <span class="btn-label">👆 占今日運程</span>

  <!-- RESULT -->
  <div id="result">
    <div class="res-head">
      <div class="res-badge" id="fortuneNumber"></div>

  <div class="div-row" style="margin-top:52px">

    <span style="font-size:1rem;color:var(--navy)">🌙</span>
    <span style="font-size:1rem;color:var(--navy)">⭐</span>
    <span style="font-size:1rem;color:var(--navy)">🌙</span>
    <div class="div-line"></div>
  </div>

  <footer>
    <div class="foot-pill">太白占卜 · 僅供娛樂參考</div>

<script>
// ══════════════════════════════════════════
// 運程資料庫（共30組）
// ══════════════════════════════════════════
const fortunes = [
// ── 1 ──
{overall:"今日宛如背著小包袱站在懸崖邊，不是真的不知危險，而是決定先跳再說。宇宙正邀請你放下過度的計算，以初心面對一切。不必想得太遠，此刻出發就是最好的決定。猶豫的話，小狗都會比你先跑出去。",money:"今日財運帶著一份隨性，錢可能從意想不到的地方輕輕飄來，也可能輕輕飄走。不宜作重大財務決定，順其自然就好，今天不是計算的日子。",health:"身體渴望新鮮感，今日最適合嘗試從未試過的運動或健康習慣。心情輕盈是今日最大的健康資產，連走路都要帶點蹦蹦跳跳的感覺。",social:"今日你散發著孩子般純真的魅力，令身邊的人不自覺地放鬆下來。主動打招呼，哪怕只是一個微笑，緣分就是這樣開始的，比你想像中容易。",fandom:"今日適合以初心重新感受偶像的魅力，找回第一次喜歡上他們的那個瞬間。不妨翻出最早追他們時存下的圖或影片，讓那份最原始的感動重新充電。",advice:"瑪麗·居禮 Marie Curie：「生活中沒有什麼可怕的東西，只有需要理解的東西。」今天選定一件因為「怕」而一直沒做的事，踏出去，哪怕只是第一步。"},
// ── 2 ──
{overall:"今日所有元素齊備，就等你舉起手，宣告開始。你擁有的能力、資源和時機，在這一刻剛好排列成一條直線。不是運氣，是你本來就有這份實力，只差今天終於肯承認。桌上的工具一樣都不少，現在缺的只是你的一個動作。",money:"今日財運主動，手上的資源比你以為的更有潛力。善用已有的條件去創造收入，而不是等待天降橫財。該出手的時候出手，猶豫只會讓機會從指縫溜走。",health:"精力充沛，身體正處於高效運作的狀態。今日特別適合建立一個新的健康習慣，意志力在線，堅持下去的機率比平時高出好幾倍。",social:"今日你說話特別有說服力，表達能力到達頂峰。有什麼想法想分享、有什麼心意想傳達，今天開口效果最好。對方會聽進去的，放心說。",fandom:"今日的追星能量主動而強烈，適合全力投入偶像相關的事情。具體來說，無論是參與投票應援、整理應援物資，還是認真寫一篇支持的帖文，今天你做的每一件事都特別有力量。",advice:"維珍尼亞·伍爾芙 Virginia Woolf：「沒有人能擋住你的路，除了你自己。」今天把一直藏著的那個想法說出來，或者動手去做，世界需要看見你獨有的那一面。"},
// ── 3 ──
{overall:"今日最強的指南針不在地圖上，在你心裏。外界的聲音再多再嘈，都不及內心那把細細的聲音來得準確。今天不需要急著表態或行動，靜靜觀察，你會看見別人看不見的東西。知道秘密的人，往往是最沉默的那一個。",money:"今日財運適合靜觀而非行動，不宜輕易作出財務決定。有些收穫需要時間醞釀，現在看似平靜的水面下，其實暗流正在積聚能量。等待，也是一種策略。",health:"今日身體的細微訊號特別值得留意，它比任何健康App都更了解你。睡眠質素影響今日狀態，若感到疲倦請認真對待，早點休息不是偷懶，是智慧。",social:"今日你的存在本身已是一種吸引力，不需要多說話。傾聽比表達更有力量，讓對方說，你只需要真心地點頭，關係自然會加深。",fandom:"今日追星直覺特別靈，隱隱感覺偶像要有動態，留意官方頻道的細微更新。具體來說，適合靜靜地深度重溫偶像的訪問或幕後片段，你會發現平時沒注意到的細節，讓你對他們的了解又深一層。",advice:"海倫·凱勒 Helen Keller：「世上最美好的事物無法被看到或觸碰到，它們必須用心去感受。」今天找一個安靜的角落，認真聆聽自己內心最想說的話，把它記下來。"},
// ── 4 ──

function stars(n){return'★'.repeat(n)+'☆'.repeat(5-n);}

function setDate(){
  document.getElementById('todayDate').textContent=
    new Date().toLocaleDateString('zh-HK',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
}

function drawFortune(){
  gtag('event', 'draw_fortune', {'event_category':'engagement','event_label':'占卜掣'});
  const btn=document.getElementById('fortuneBtn');
  const res=document.getElementById('result');
  btn.classList.add('spinning');btn.disabled=true;
  res.classList.remove('vis');
  setTimeout(()=>{
    btn.classList.remove('spinning');btn.disabled=false;
    const i=Math.floor(Math.random()*fortunes.length);
    const f=fortunes[i];
    document.getElementById('fortuneNumber').textContent=`✦ 第 ${String(i+1).padStart(2,'0')} 籤 ✦`;
    const cats=[
      {icon:'🌟',cat:'整體運程',key:'overall',text:f.overall},
      {icon:'💰',cat:'金錢運',  key:'money',  text:f.money},
      {icon:'🌿',cat:'健康運',  key:'health', text:f.health},
      {icon:'🌸',cat:'人緣運',  key:'social', text:f.social},
      {icon:'⭐',cat:'追星運',  key:'fandom', text:f.fandom},
    ];
    let html=cats.map(c=>`
      <div class="card">
        <div class="c-head">
          <span class="c-icon">${c.icon}</span>
          <span class="c-cat">${c.cat}</span>
          <span class="c-stars">${stars(ratings[c.key][i])}</span>
        </div>
        <p class="c-text">${c.text}</p>
      </div>`).join('');
    html+=`<div class="card advice">
      <div class="c-head"><span class="c-icon">🔮</span><span class="c-cat">今日建議</span></div>
      <p class="c-text">${f.advice}</p></div>`;
    document.getElementById('cardsGrid').innerHTML=html;
    res.classList.add('vis');
    setTimeout(()=>res.scrollIntoView({behavior:'smooth',block:'start'}),200);
  },1100);
}

function resetFortune(){
  document.getElementById('result').classList.remove('vis');
  window.scrollTo({top:0,behavior:'smooth'});
}
